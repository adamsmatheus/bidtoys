spring:
  application:
    name: leilao-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/leilao}
    username: ${DB_USERNAME:leilao}
    password: ${DB_PASSWORD:leilao}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-must-be-at-least-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
    base-url: ${BASE_URL:http://localhost:8080}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:leilao}
      public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  whatsapp:
    enabled: ${WHATSAPP_ENABLED:false}
    token: ${WHATSAPP_TOKEN:}
    phone-id: ${WHATSAPP_PHONE_ID:}
  worker:
    auction-closure:
      cron: "0 * * * * *"    # a cada minuto
      enabled: true
    outbox:
      cron: "*/30 * * * * *" # a cada 30 segundos
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.leilao: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: api

---
spring:
  config:
    activate:
      on-profile: worker

  flyway:
    enabled: false

logging:
  level:
    com.leilao.worker: DEBUG
